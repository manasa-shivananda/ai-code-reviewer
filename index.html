<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Code Reviewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #58a6ff, #bc8cff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #8b949e;
      margin-bottom: 32px;
      font-size: 1rem;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    select {
      width: 200px;
      padding: 8px 12px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      font-size: 0.875rem;
      margin-bottom: 16px;
      cursor: pointer;
    }

    textarea {
      width: 100%;
      min-height: 200px;
      padding: 16px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      font-family: 'Courier New', monospace;
      font-size: 0.875rem;
      resize: vertical;
      line-height: 1.6;
    }

    textarea:focus, select:focus {
      outline: none;
      border-color: #58a6ff;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #238636, #2ea043);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .loading {
      text-align: center;
      padding: 40px;
      color: #8b949e;
      display: none;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .results { display: none; }

    .results h2 {
      font-size: 1.25rem;
      margin-bottom: 20px;
      color: #58a6ff;
    }

    .review-content {
      white-space: pre-wrap;
      line-height: 1.8;
      font-size: 0.95rem;
      color: #e6edf3;
    }

    .error {
      background: #2d1416;
      border: 1px solid #f85149;
      border-radius: 8px;
      padding: 16px;
      color: #f85149;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 AI Code Reviewer</h1>
    <p class="subtitle">Paste your code and get instant feedback from an AI senior developer</p>

    <div class="card">
      <label>Programming Language</label>
      <select id="language">
        <option value="JavaScript">JavaScript</option>
        <option value="Python">Python</option>
        <option value="Java">Java</option>
        <option value="React">React</option>
        <option value="Node.js">Node.js</option>
        <option value="TypeScript">TypeScript</option>
        <option value="Other">Other</option>
      </select>

      <label>Your Code</label>
      <textarea 
        id="code" 
        placeholder="Paste your code here..."
      ></textarea>
    </div>

    <button id="reviewBtn" onclick="reviewCode()">
      Review My Code
    </button>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Claude is reviewing your code...</p>
    </div>

    <div class="error" id="error"></div>

    <div class="card results" id="results">
      <h2>Code Review Results</h2>
      <div class="review-content" id="reviewContent"></div>
    </div>
  </div>

  <script>
    async function reviewCode() {
      const code = document.getElementById('code').value.trim()
      const language = document.getElementById('language').value

      if (!code) {
        alert('Please paste some code first!')
        return
      }

      // Show loading
      document.getElementById('loading').style.display = 'block'
      document.getElementById('results').style.display = 'none'
      document.getElementById('error').style.display = 'none'
      document.getElementById('reviewBtn').disabled = true

      try {
        const response = await fetch('http://localhost:3000/api/review', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code, language })
        })

        const data = await response.json()

        if (data.error) throw new Error(data.error)

        // Show results
        document.getElementById('reviewContent').textContent = data.review
        document.getElementById('results').style.display = 'block'

      } catch (err) {
        document.getElementById('error').textContent = 'Error: ' + err.message
        document.getElementById('error').style.display = 'block'
      } finally {
        document.getElementById('loading').style.display = 'none'
        document.getElementById('reviewBtn').disabled = false
      }
    }
  </script>
</body>
</html>
